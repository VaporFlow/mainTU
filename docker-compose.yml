version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: maintu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    command: gunicorn maintu.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
  frontend:
    build: ./frontend
    command: npm start
    volumes:
      - ./frontend:/app
    env_file:
      - .env
    depends_on:
      - backend
volumes:
  postgres_data:
